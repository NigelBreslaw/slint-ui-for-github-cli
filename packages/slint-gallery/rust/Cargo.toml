[package]
name = "primer_slint_gallery"
version = "0.1.0"
edition = "2021"
description = "Rust runner for the Primer Slint component gallery (native: winit + Skia; wasm: winit + FemtoVG)"
publish = false
autobins = false
default-run = "primer_slint_gallery_runner"

[[bin]]
name = "primer_slint_gallery_runner"
path = "src/main.rs"

[lib]
path = "src/lib.rs"
crate-type = ["lib", "cdylib"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
slint = { git = "https://github.com/Murmele/slint.git", branch = "mm/flickable-mouse-wheel-slow-down-fix", default-features = false, features = ["std", "compat-1-2", "backend-winit", "renderer-skia"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
slint = { git = "https://github.com/Murmele/slint.git", branch = "mm/flickable-mouse-wheel-slow-down-fix", default-features = false, features = ["std", "compat-1-2", "backend-winit", "renderer-femtovg"] }
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"

[build-dependencies]
slint-build = { git = "https://github.com/Murmele/slint.git", branch = "mm/flickable-mouse-wheel-slow-down-fix" }

# Smaller artifacts for `cargo build --release` / `wasm-pack build --release` (slower compiles, esp. with LTO).
# Native and wasm share this profile; the dominant wasm size is still Slint + winit + renderer.
[profile.release]
codegen-units = 1
lto = "thin"
opt-level = "z"
panic = "abort"
strip = true

# Newer rustc emits post-MVP wasm; wasm-pack's `wasm-opt -O` must allow the same feature set.
# See https://github.com/rust-lang/rust/issues/141080
[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-Oz", "--enable-bulk-memory", "--enable-nontrapping-float-to-int"]
