[package]
name = "primer_slint_gallery"
version = "0.1.0"
edition = "2021"
description = "Rust runner for the Primer Slint component gallery (native: winit + Skia; wasm: winit + FemtoVG)"
publish = false
autobins = false
default-run = "primer_slint_gallery_runner"

[[bin]]
name = "primer_slint_gallery_runner"
path = "src/main.rs"

[lib]
path = "src/lib.rs"
crate-type = ["lib", "cdylib"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
slint = { git = "https://github.com/slint-ui/slint", branch = "master", default-features = false, features = ["std", "compat-1-2", "backend-winit", "renderer-skia"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
slint = { git = "https://github.com/slint-ui/slint", branch = "master", default-features = false, features = ["std", "compat-1-2", "backend-winit", "renderer-femtovg"] }
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"

[build-dependencies]
slint-build = { git = "https://github.com/slint-ui/slint", branch = "master" }
