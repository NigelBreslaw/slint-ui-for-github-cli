[package]
name = "primer_slint_gallery"
version = "0.1.0"
edition = "2021"
description = "Rust runner for the Primer Slint component gallery (winit + Skia)"
publish = false

[dependencies]
slint = { git = "https://github.com/slint-ui/slint", branch = "master", default-features = false, features = ["std", "compat-1-2", "backend-winit", "renderer-skia"] }

[build-dependencies]
slint-build = { git = "https://github.com/slint-ui/slint", branch = "master" }
